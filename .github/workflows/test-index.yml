name: Test Reindex Trigger

on:
  push:
    branches:
      - chore/reindex

jobs:
  reindex:
    name: Trigger Reindex Only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 使用 GitHub App 產生 Token 以觸發另一個 repository 的 workflow
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ vars.REINDEX_REPO_NAME }}

      - name: Trigger Reindex
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ vars.REINDEX_REPO }}/dispatches \
            -d '{
              "event_type": "reindex",
              "client_payload": {
                "source": "${{ github.repository }}",
                "commit": "${{ github.sha }}",
                "triggered_by": "${{ github.actor }}"
              }
            }'
          echo "✅ Triggered reindex on ${{ vars.REINDEX_REPO }}"
